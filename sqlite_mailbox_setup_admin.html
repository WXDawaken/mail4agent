<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Setup Mailbox Admin</title>
  <style>
    :root {
      --bg: #f5f0e7;
      --ink: #1f2933;
      --muted: #5c6b73;
      --panel: rgba(255, 252, 246, 0.94);
      --brand: #a63d40;
      --brand-2: #7f2f31;
      --accent: #2f6f62;
      --line: rgba(31, 41, 51, 0.12);
      --shadow: 0 18px 50px rgba(34, 41, 47, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      color: var(--ink);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(166, 61, 64, 0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(47, 111, 98, 0.16), transparent 30%),
        linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
    }

    .panel {
      width: min(560px, 100%);
      background: var(--panel);
      border-radius: 24px;
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0 0 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.55;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    input, button {
      font: inherit;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      color: var(--ink);
    }

    input:focus {
      outline: none;
      border-color: rgba(166, 61, 64, 0.45);
      box-shadow: 0 0 0 4px rgba(166, 61, 64, 0.12);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 100%);
      color: #fff7f2;
      box-shadow: 0 10px 24px rgba(166, 61, 64, 0.24);
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .status {
      margin-top: 16px;
      min-height: 52px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(47, 111, 98, 0.1);
      color: var(--accent);
      line-height: 1.45;
    }

    .status.error {
      background: rgba(166, 61, 64, 0.12);
      color: var(--brand);
    }

    pre {
      margin: 14px 0 0;
      padding: 14px;
      border-radius: 14px;
      background: #1f2a33;
      color: #d9e2ec;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.88rem;
    }
  </style>
</head>
<body>
  <section class="panel">
    <h1>Initialize Admin</h1>
    <p>This one-time page creates the first admin account. The setup token comes from the server startup log and is accepted only once.</p>
    <form id="setup-form">
      <label>
        Username
        <input id="username" required placeholder="admin">
      </label>
      <label>
        Password
        <input id="password" type="password" required placeholder="At least 8 characters">
      </label>
      <label>
        Confirm password
        <input id="password-confirm" type="password" required placeholder="Repeat password">
      </label>
      <button id="submit-button" type="submit">Create Admin Account</button>
    </form>
    <div id="status-box" class="status">Waiting for input.</div>
    <pre id="result-box">Open this page from the exact setup URL printed by the server.</pre>
  </section>

  <script>
    const form = document.getElementById("setup-form");
    const submitButton = document.getElementById("submit-button");
    const statusBox = document.getElementById("status-box");
    const resultBox = document.getElementById("result-box");
    const params = new URLSearchParams(window.location.search);
    const setupToken = params.get("token") || "";

    function setStatus(message, isError = false) {
      statusBox.textContent = message;
      statusBox.classList.toggle("error", isError);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const passwordConfirm = document.getElementById("password-confirm").value;

      if (!setupToken) {
        setStatus("Missing setup token in URL.", true);
        return;
      }
      if (password !== passwordConfirm) {
        setStatus("Passwords do not match.", true);
        return;
      }

      submitButton.disabled = true;
      try {
        const response = await fetch("/setup-admin/complete", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json",
          },
          body: JSON.stringify({
            token: setupToken,
            username,
            password,
          }),
        });
        const payload = await response.json().catch(async () => ({
          ok: false,
          error: await response.text(),
        }));
        resultBox.textContent = JSON.stringify(payload, null, 2);
        if (!response.ok) {
          setStatus(payload.error || "setup failed", true);
          return;
        }
        setStatus("Admin account created. You can now open /admin-ui and sign in with username/password.");
      } catch (error) {
        resultBox.textContent = String(error);
        setStatus("Request failed.", true);
      } finally {
        submitButton.disabled = false;
      }
    });

    if (!setupToken) {
      setStatus("Missing setup token in URL.", true);
    }
  </script>
</body>
</html>
